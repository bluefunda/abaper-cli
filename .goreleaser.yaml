version: 2
project_name: abaper

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/abaper
    binary: abaper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/bluefunda/abaper-cli/internal/commands.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - man/abaper.1
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: bluefunda
      name: homebrew-tap
      token: "{{ .Env.GH_PAT }}"
    directory: Formula
    homepage: "https://abaper.bluefunda.com"
    description: "Command line interface for the ABAPer platform"
    license: "MIT"
    install: |
      bin.install "abaper"
      man1.install "man/abaper.1"
    test: |
      system "#{bin}/abaper", "version"

changelog:
  use: github-native
